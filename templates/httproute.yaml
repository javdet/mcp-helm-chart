{{- if .Values.gatewayApi.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
  {{- with .Values.gatewayApi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gatewayApi.parentRefs }}
  parentRefs:
    {{- range . }}
    - name: {{ required "gatewayApi.parentRefs[].name is required" .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . | int }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.gatewayApi.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.gatewayApi.rules }}
    {{- range .Values.gatewayApi.rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .timeouts $.Values.gatewayApi.timeouts }}
      timeouts:
        {{- toYaml (.timeouts | default $.Values.gatewayApi.timeouts) | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- if .backendRefs }}
        {{- toYaml .backendRefs | nindent 8 }}
        {{- else }}
        - name: {{ include "mcp.fullname" $ }}
          port: {{ $.Values.service.port | int }}
        {{- end }}
    {{- end }}
    {{- else }}
    - {{- with .Values.gatewayApi.timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "mcp.fullname" . }}
          port: {{ .Values.service.port | int }}
    {{- end }}
{{- end }}
