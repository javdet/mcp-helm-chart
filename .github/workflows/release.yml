name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages/
          ls -la .cr-release-packages/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: .gh-pages
          fetch-depth: 1
        continue-on-error: true

      - name: Build repository index
        run: |
          mkdir -p .gh-pages
          cp .cr-release-packages/*.tgz .gh-pages/

          if [ -f .gh-pages/index.yaml ]; then
            helm repo index .gh-pages/ \
              --url https://javdet.github.io/mcp-helm-chart \
              --merge .gh-pages/index.yaml
          else
            helm repo index .gh-pages/ \
              --url https://javdet.github.io/mcp-helm-chart
          fi

          cp artifacthub-repo.yml .gh-pages/ 2>/dev/null || true
          touch .gh-pages/.nojekyll

          echo "--- index.yaml ---"
          cat .gh-pages/index.yaml
          echo "--- files ---"
          ls -la .gh-pages/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.gh-pages
          keep_files: false
