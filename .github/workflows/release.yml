name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package . -d .cr-release-packages/
          ls -la .cr-release-packages/

      - name: Build gh-pages content
        run: |
          mkdir -p .gh-pages

          cp .cr-release-packages/*.tgz .gh-pages/

          # Fetch existing index.yaml to merge with (keeps old versions)
          curl -fsSL https://javdet.github.io/mcp-helm-chart/index.yaml \
            -o .gh-pages/old-index.yaml 2>/dev/null && \
            helm repo index .gh-pages/ \
              --url https://javdet.github.io/mcp-helm-chart \
              --merge .gh-pages/old-index.yaml && \
            rm -f .gh-pages/old-index.yaml || \
            helm repo index .gh-pages/ \
              --url https://javdet.github.io/mcp-helm-chart

          cp artifacthub-repo.yml .gh-pages/ 2>/dev/null || true
          touch .gh-pages/.nojekyll

          echo "--- index.yaml ---"
          cat .gh-pages/index.yaml
          echo "--- files ---"
          ls -la .gh-pages/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.gh-pages
          force_orphan: true
