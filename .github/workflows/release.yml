name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_REPO: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .

      - name: Extract chart metadata
        id: meta
        run: |
          echo "name=$(yq '.name' Chart.yaml)" >> "$GITHUB_OUTPUT"
          echo "version=$(yq '.version' Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "$REGISTRY" \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Package chart
        run: |
          helm package . -d .cr-release-packages/
          ls -la .cr-release-packages/

      - name: Push to GHCR
        run: |
          helm push \
            .cr-release-packages/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.tgz \
            oci://${{ env.CHART_REPO }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}
          generate_release_notes: true
          make_latest: "true"
          files: |
            .cr-release-packages/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.tgz
